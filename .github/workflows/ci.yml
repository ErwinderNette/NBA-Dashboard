name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (blocking)
        run: npm run build

      - name: Lint frontend (non-blocking until lint debt is fixed)
        continue-on-error: true
        run: npm run lint

  backend:
    name: Backend Format Vet Test Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: go-backend/go.sum

      - name: Check formatting (blocking)
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet backend (blocking)
        run: go vet ./...

      - name: Test backend (blocking)
        run: go test ./...

      - name: Build backend binary (blocking)
        run: go build -o app ./cmd

  build-images:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./go-backend
          file: ./go-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nba-backend:latest
            ghcr.io/${{ github.repository_owner }}/nba-backend:sha-${{ github.sha }}

      - name: Build and push frontend production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://nba.uppr.de/api
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_ALLOWED_ORIGINS=https://nba.uppr.de
          tags: |
            ghcr.io/${{ github.repository_owner }}/nba-frontend:latest
            ghcr.io/${{ github.repository_owner }}/nba-frontend:sha-${{ github.sha }}
